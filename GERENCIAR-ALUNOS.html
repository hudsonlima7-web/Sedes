<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Gerenciar Todos os Alunos - SEDES DF 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: #2d3748;
            text-align: center;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            text-align: center;
            font-size: 1.1rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .stat-card p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .btn-success {
            background: #10b981;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .search-box {
            margin-bottom: 24px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .alunos-grid {
            display: grid;
            gap: 16px;
        }
        .aluno-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .aluno-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .aluno-card.inativo {
            opacity: 0.6;
            background: #fee;
        }
        .aluno-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        .aluno-nome {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 4px;
        }
        .aluno-status {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-ativo {
            background: #d4edda;
            color: #155724;
        }
        .status-inativo {
            background: #f8d7da;
            color: #721c24;
        }
        .aluno-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-label {
            font-size: 0.75rem;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
        }
        .info-value {
            font-size: 0.95rem;
            color: #2d3748;
            font-weight: 600;
            font-family: monospace;
        }
        .aluno-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .link-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }
        .link-box h4 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .link-box a {
            color: #667eea;
            font-weight: 600;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h2 {
            color: #2d3748;
            font-size: 1.5rem;
        }
        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #718096;
        }
        .credentials-box {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
        }
        .credentials-box h3 {
            color: #155724;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        .credentials-box code {
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            display: block;
            margin: 8px 0;
            color: #2d3748;
            font-weight: 600;
        }
        .message-template {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 Gerenciar Todos os Alunos</h1>
        <p class="subtitle">Sistema completo de gerenciamento de alunos</p>

        <div class="stats" id="stats">
            <div class="stat-card">
                <h3 id="totalAlunos">0</h3>
                <p>Total de Alunos</p>
            </div>
            <div class="stat-card">
                <h3 id="alunosAtivos">0</h3>
                <p>Alunos Ativos</p>
            </div>
            <div class="stat-card">
                <h3 id="alunosInativos">0</h3>
                <p>Alunos Inativos</p>
            </div>
        </div>

        <div class="actions">
            <button class="btn" onclick="corrigirTodos()">🔧 Corrigir Todos os Alunos</button>
            <button class="btn btn-success" onclick="ativarTodos()">✅ Ativar Todos</button>
            <button class="btn btn-secondary" onclick="resetarSenhasTodos()">🔐 Resetar Todas as Senhas</button>
            <button class="btn btn-secondary" onclick="exportarCredenciais()">📋 Exportar Credenciais</button>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 Atualizar</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar aluno por nome, email ou telefone..." onkeyup="filtrarAlunos()">
        </div>

        <div class="alunos-grid" id="alunosGrid"></div>
    </div>

    <!-- Modal de Credenciais -->
    <div class="modal" id="modalCredenciais">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔑 Credenciais do Aluno</h2>
                <button class="btn-close" onclick="fecharModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let alunos = [];
        const linkSistema = window.location.origin + window.location.pathname.replace('GERENCIAR-ALUNOS.html', 'index.html');

        function carregarAlunos() {
            alunos = JSON.parse(localStorage.getItem('alunos') || '[]');
            atualizarStats();
            renderizarAlunos();
        }

        function atualizarStats() {
            const total = alunos.length;
            const ativos = alunos.filter(a => a.ativo).length;
            const inativos = total - ativos;

            document.getElementById('totalAlunos').textContent = total;
            document.getElementById('alunosAtivos').textContent = ativos;
            document.getElementById('alunosInativos').textContent = inativos;
        }

        function renderizarAlunos() {
            const grid = document.getElementById('alunosGrid');
            
            if (alunos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 Nenhum aluno cadastrado</h3>
                        <p>Cadastre alunos pelo checkout ou crie um aluno teste no diagnóstico.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = alunos.map(aluno => `
                <div class="aluno-card ${!aluno.ativo ? 'inativo' : ''}" data-id="${aluno.id}">
                    <div class="aluno-header">
                        <div>
                            <div class="aluno-nome">${aluno.nome}</div>
                            <span class="aluno-status ${aluno.ativo ? 'status-ativo' : 'status-inativo'}">
                                ${aluno.ativo ? '✅ Ativo' : '❌ Inativo'}
                            </span>
                        </div>
                    </div>
                    
                    <div class="aluno-info">
                        <div class="info-item">
                            <span class="info-label">📧 Email</span>
                            <span class="info-value">${aluno.email}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">🔐 Senha</span>
                            <span class="info-value">${aluno.senha}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">📱 Telefone</span>
                            <span class="info-value">${aluno.telefone || 'Não informado'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">💼 Cargo</span>
                            <span class="info-value">${aluno.cargo || 'Não informado'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">📦 Plano</span>
                            <span class="info-value">${aluno.plano || 'Não informado'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">💰 Valor</span>
                            <span class="info-value">R$ ${aluno.valorMensalidade || 0}</span>
                        </div>
                    </div>

                    <div class="aluno-actions">
                        <button class="btn btn-small" onclick="mostrarCredenciais(${aluno.id})">🔑 Ver Credenciais</button>
                        <button class="btn btn-small btn-secondary" onclick="copiarCredenciais(${aluno.id})">📋 Copiar</button>
                        <button class="btn btn-small btn-secondary" onclick="resetarSenha(${aluno.id})">🔐 Resetar Senha</button>
                        <button class="btn btn-small ${aluno.ativo ? 'btn-danger' : 'btn-success'}" onclick="toggleAtivo(${aluno.id})">
                            ${aluno.ativo ? '❌ Desativar' : '✅ Ativar'}
                        </button>
                        <button class="btn btn-small btn-secondary" onclick="corrigirAluno(${aluno.id})">🔧 Corrigir</button>
                    </div>

                    <div class="link-box">
                        <h4>🔗 Link de Acesso:</h4>
                        <a href="${linkSistema}" target="_blank">${linkSistema}</a>
                    </div>
                </div>
            `).join('');
        }

        function filtrarAlunos() {
            const busca = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.aluno-card');
            
            cards.forEach(card => {
                const texto = card.textContent.toLowerCase();
                card.style.display = texto.includes(busca) ? 'block' : 'none';
            });
        }

        function corrigirTodos() {
            if (!confirm('🔧 Corrigir TODOS os alunos?\n\nIsso vai:\n- Ativar todos os alunos\n- Adicionar campo "cargo" se estiver faltando\n- Garantir que todos os campos estão preenchidos\n\nContinuar?')) {
                return;
            }

            let corrigidos = 0;
            alunos.forEach(aluno => {
                if (!aluno.ativo) {
                    aluno.ativo = true;
                    corrigidos++;
                }
                if (!aluno.cargo) {
                    aluno.cargo = 'Agente';
                    corrigidos++;
                }
                if (!aluno.senha || aluno.senha.length < 4) {
                    aluno.senha = 'Sedes';
                    corrigidos++;
                }
            });

            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert(`✅ ${corrigidos} correções feitas!\n\nTodos os alunos foram corrigidos.`);
            carregarAlunos();
        }

        function ativarTodos() {
            if (!confirm('✅ Ativar TODOS os alunos?')) {
                return;
            }

            alunos.forEach(aluno => aluno.ativo = true);
            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert('✅ Todos os alunos foram ativados!');
            carregarAlunos();
        }

        function resetarSenhasTodos() {
            if (!confirm('🔐 Resetar senha de TODOS os alunos para "Sedes"?')) {
                return;
            }

            alunos.forEach(aluno => aluno.senha = 'Sedes');
            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert('✅ Todas as senhas foram resetadas para "Sedes"!');
            carregarAlunos();
        }

        function resetarSenha(id) {
            const aluno = alunos.find(a => a.id === id);
            if (!aluno) return;

            if (!confirm(`🔐 Resetar senha de ${aluno.nome} para "Sedes"?`)) {
                return;
            }

            aluno.senha = 'Sedes';
            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert('✅ Senha resetada para "Sedes"!');
            carregarAlunos();
        }

        function toggleAtivo(id) {
            const aluno = alunos.find(a => a.id === id);
            if (!aluno) return;

            aluno.ativo = !aluno.ativo;
            localStorage.setItem('alunos', JSON.stringify(alunos));
            carregarAlunos();
        }

        function corrigirAluno(id) {
            const aluno = alunos.find(a => a.id === id);
            if (!aluno) return;

            aluno.ativo = true;
            if (!aluno.cargo) aluno.cargo = 'Agente';
            if (!aluno.senha || aluno.senha.length < 4) aluno.senha = 'Sedes';

            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert(`✅ Aluno ${aluno.nome} corrigido!`);
            carregarAlunos();
        }

        function mostrarCredenciais(id) {
            const aluno = alunos.find(a => a.id === id);
            if (!aluno) return;

            const mensagem = criarMensagemBoasVindas(aluno);

            document.getElementById('modalBody').innerHTML = `
                <div class="credentials-box">
                    <h3>🔑 Credenciais de Acesso</h3>
                    <code>📧 Email: ${aluno.email}</code>
                    <code>🔐 Senha: ${aluno.senha}</code>
                </div>

                <div class="link-box">
                    <h4>🔗 Link de Acesso:</h4>
                    <a href="${linkSistema}" target="_blank">${linkSistema}</a>
                </div>

                <h3 style="margin: 24px 0 12px 0; color: #2d3748;">📱 Mensagem para Enviar ao Aluno:</h3>
                <div class="message-template">${mensagem}</div>

                <div style="display: flex; gap: 12px; margin-top: 16px;">
                    <button class="btn" onclick="copiarMensagem(\`${mensagem.replace(/`/g, '\\`')}\`)">📋 Copiar Mensagem</button>
                    <button class="btn btn-secondary" onclick="copiarCredenciais(${id})">🔑 Copiar Só Credenciais</button>
                </div>
            `;

            document.getElementById('modalCredenciais').classList.add('show');
        }

        function criarMensagemBoasVindas(aluno) {
            return `🎓 BEM-VINDO(A) AO SEDES DF 2026!

Olá ${aluno.nome}! 👋

É com grande satisfação que damos as boas-vindas à Plataforma SEDES DF 2026! 🚀

━━━━━━━━━━━━━━━━━━━━
🔑 SEUS DADOS DE ACESSO
━━━━━━━━━━━━━━━━━━━━

📧 E-mail/Login:
${aluno.email}

🔐 Sua Senha:
${aluno.senha}

⚠️ IMPORTANTE: Guarde sua senha em local seguro!

━━━━━━━━━━━━━━━━━━━━
🚀 ACESSE AGORA
━━━━━━━━━━━━━━━━━━━━

${linkSistema}

━━━━━━━━━━━━━━━━━━━━
📋 COMO ACESSAR:
━━━━━━━━━━━━━━━━━━━━

1️⃣ Clique no link acima
2️⃣ Digite seu email
3️⃣ Digite sua senha
4️⃣ Clique em "Entrar"

⚠️ Se não funcionar:
Pressione Ctrl + Shift + R no navegador e tente novamente

━━━━━━━━━━━━━━━━━━━━
💡 DICA:
━━━━━━━━━━━━━━━━━━━━

Você pode alterar sua senha após o primeiro login no menu lateral!

━━━━━━━━━━━━━━━━━━━━
📞 PRECISA DE AJUDA?
━━━━━━━━━━━━━━━━━━━━

📧 suporte@sedesdf2026.com.br
💬 (61) 99999-9999

Bons estudos e até a aprovação! 🎓✨

Equipe SEDES DF 2026`;
        }

        function copiarMensagem(mensagem) {
            navigator.clipboard.writeText(mensagem).then(() => {
                alert('✅ Mensagem copiada para a área de transferência!');
            });
        }

        function copiarCredenciais(id) {
            const aluno = alunos.find(a => a.id === id);
            if (!aluno) return;

            const texto = `Email: ${aluno.email}\nSenha: ${aluno.senha}\nLink: ${linkSistema}`;
            navigator.clipboard.writeText(texto).then(() => {
                alert('✅ Credenciais copiadas para a área de transferência!');
            });
        }

        function exportarCredenciais() {
            if (alunos.length === 0) {
                alert('❌ Nenhum aluno cadastrado!');
                return;
            }

            let texto = '📋 CREDENCIAIS DE TODOS OS ALUNOS - SEDES DF 2026\n\n';
            texto += `🔗 Link do Sistema: ${linkSistema}\n\n`;
            texto += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';

            alunos.forEach((aluno, index) => {
                texto += `${index + 1}. ${aluno.nome}\n`;
                texto += `   📧 Email: ${aluno.email}\n`;
                texto += `   🔐 Senha: ${aluno.senha}\n`;
                texto += `   📱 Telefone: ${aluno.telefone || 'Não informado'}\n`;
                texto += `   ✅ Status: ${aluno.ativo ? 'Ativo' : 'Inativo'}\n`;
                texto += `\n`;
            });

            // Criar arquivo para download
            const blob = new Blob([texto], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `credenciais-alunos-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);

            alert('✅ Arquivo de credenciais baixado!');
        }

        function fecharModal() {
            document.getElementById('modalCredenciais').classList.remove('show');
        }

        // Carregar ao iniciar
        window.onload = carregarAlunos;

        // Fechar modal ao clicar fora
        document.getElementById('modalCredenciais').addEventListener('click', function(e) {
            if (e.target === this) {
                fecharModal();
            }
        });
    </script>
</body>
</html>
