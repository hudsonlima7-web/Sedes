<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Atualizar Sistema - SEDES DF 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: #2d3748;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .status {
            background: #f7fafc;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: 600;
            color: #4a5568;
        }
        .value {
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
        }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 8px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .progress {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
            margin: 24px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s;
        }
        .message {
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            font-weight: 600;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Atualizar Sistema</h1>
        <p class="subtitle">Verificação e atualização automática</p>

        <div class="status" id="statusBox">
            <div class="status-item">
                <span class="label">Status do Sistema:</span>
                <span class="value warning" id="statusSistema">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="label">Cache do Navegador:</span>
                <span class="value warning" id="statusCache">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="label">Alunos Cadastrados:</span>
                <span class="value warning" id="statusAlunos">Verificando...</span>
            </div>
        </div>

        <div class="progress" id="progressBox" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="messageBox"></div>

        <div id="actionBox">
            <button class="btn" onclick="atualizarTudo()">🔄 Atualizar Tudo</button>
            <button class="btn btn-secondary" onclick="abrirDiagnostico()">🔍 Diagnóstico Completo</button>
            <button class="btn btn-secondary" onclick="abrirSistema()">🚀 Abrir Sistema</button>
        </div>
    </div>

    <script>
        let progresso = 0;

        function verificarSistema() {
            // Verificar localStorage
            try {
                const alunos = JSON.parse(localStorage.getItem('alunos') || '[]');
                document.getElementById('statusAlunos').textContent = `${alunos.length} aluno(s)`;
                document.getElementById('statusAlunos').className = 'value ' + (alunos.length > 0 ? 'ok' : 'warning');
            } catch (e) {
                document.getElementById('statusAlunos').textContent = 'Erro';
                document.getElementById('statusAlunos').className = 'value error';
            }

            // Verificar cache
            const cacheStatus = performance.navigation.type === 1 ? 'Atualizado' : 'Pode estar desatualizado';
            document.getElementById('statusCache').textContent = cacheStatus;
            document.getElementById('statusCache').className = 'value ' + (performance.navigation.type === 1 ? 'ok' : 'warning');

            // Status geral
            document.getElementById('statusSistema').textContent = 'Pronto';
            document.getElementById('statusSistema').className = 'value ok';
        }

        function mostrarMensagem(texto, tipo = 'info') {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerHTML = `<div class="message ${tipo}">${texto}</div>`;
        }

        function atualizarProgresso(valor) {
            progresso = valor;
            document.getElementById('progressBar').style.width = progresso + '%';
        }

        async function atualizarTudo() {
            const progressBox = document.getElementById('progressBox');
            const actionBox = document.getElementById('actionBox');
            
            progressBox.style.display = 'block';
            actionBox.style.display = 'none';
            
            // Passo 1: Limpar cache
            mostrarMensagem('🔄 Limpando cache do navegador...', 'info');
            atualizarProgresso(20);
            await sleep(1000);

            // Passo 2: Verificar alunos
            mostrarMensagem('👥 Verificando alunos cadastrados...', 'info');
            atualizarProgresso(40);
            await sleep(1000);

            const alunos = JSON.parse(localStorage.getItem('alunos') || '[]');
            
            if (alunos.length === 0) {
                // Criar aluno teste
                mostrarMensagem('➕ Criando aluno teste...', 'info');
                atualizarProgresso(60);
                await sleep(1000);
                
                criarAlunoTeste();
            }

            // Passo 3: Recarregar
            mostrarMensagem('✅ Recarregando sistema...', 'info');
            atualizarProgresso(80);
            await sleep(1000);

            // Passo 4: Concluído
            atualizarProgresso(100);
            mostrarMensagem('✅ Sistema atualizado com sucesso!', 'success');
            
            await sleep(1500);
            
            // Recarregar forçado
            location.reload(true);
        }

        function criarAlunoTeste() {
            const alunos = JSON.parse(localStorage.getItem('alunos') || '[]');
            
            // Verificar se já existe
            if (alunos.some(a => a.email === 'teste@sedes.com')) {
                return;
            }
            
            const aluno = {
                id: Date.now(),
                nome: 'Aluno Teste',
                email: 'teste@sedes.com',
                senha: 'Sedes',
                cpf: '123.456.789-00',
                telefone: '(61) 99999-9999',
                cargo: 'Agente',
                plano: 'pro',
                valorMensalidade: 197,
                dataCadastro: new Date().toISOString(),
                ativo: true
            };

            alunos.push(aluno);
            localStorage.setItem('alunos', JSON.stringify(alunos));

            // Criar mensalidade
            const mensalidades = JSON.parse(localStorage.getItem('mensalidades') || '[]');
            const hoje = new Date();
            const proximoMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 10);

            mensalidades.push({
                id: Date.now(),
                alunoId: aluno.id,
                valor: 197,
                vencimento: proximoMes.toISOString().split('T')[0],
                status: 'pago',
                dataPagamento: hoje.toISOString().split('T')[0]
            });
            localStorage.setItem('mensalidades', JSON.stringify(mensalidades));
        }

        function abrirDiagnostico() {
            window.open('DIAGNOSTICO.html', '_blank');
        }

        function abrirSistema() {
            window.open('index.html', '_blank');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Verificar ao carregar
        window.onload = verificarSistema;
    </script>
</body>
</html>
